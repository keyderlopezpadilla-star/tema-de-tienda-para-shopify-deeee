name: Theme Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  theme-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Shopify Theme Check
        uses: shopify/theme-check-action@v2
        with:
          version: latest
